name: Build and Release

on:
  push:
    branches:
      - main
      - build
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build (${{ matrix.platform }} - ${{ matrix.target || 'Default' }})
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            target: 'aarch64-apple-darwin'
          - platform: 'macos-latest'
            target: 'x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            target: ''
          - platform: 'windows-latest'
            target: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./apps/desktop/src-tauri -> target"

      - name: Install System Dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install JS Dependencies
        run: |
          npm ci
          cd apps/desktop && npm install

      - name: Build Application
        run: |
          cd apps/desktop
          # Build frontend
          npm run build
          # Build Tauri bundles
          if [ -n "${{ matrix.target }}" ]; then
            npx tauri build --target ${{ matrix.target }}
          else
            npx tauri build
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Collect and Rename Artifacts
        shell: bash
        run: |
          echo "=== ARTIFACT DISCOVERY ==="
          mkdir -p artifacts
          
          # Search everywhere except node_modules and .git
          echo "Scanning for installers..."
          find . -type f \( -name "*.dmg" -o -name "*.exe" -o -name "*.msi" -o -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" \) -not -path "*/node_modules/*" -not -path "./.git/*" | while read -r file; do
            # Only process if it belongs to a bundle folder (Tauri standard)
            if [[ "$file" == *"bundle"* ]]; then
              filename=$(basename "$file")
              ext="${filename##*.}"
              base="${filename%.*}"
              
              # Clean name (remove versioning)
              clean_name=$(echo "$base" | sed -E 's/(_|-)?[0-9]+\.[0-9]+\.[0-9]+(_|-)?[0-9]*//g')
              
              # Construct new name with target suffix for clarity
              target_info="${{ matrix.target }}"
              if [ -z "$target_info" ]; then
                # Infer simple platform name if no specific target
                if [[ "${{ matrix.platform }}" == *"windows"* ]]; then target_info="x64"; fi
                if [[ "${{ matrix.platform }}" == *"ubuntu"* ]]; then target_info="amd64"; fi
              fi
              
              newname="${clean_name}-${target_info}.${ext}"
              newname=$(echo "$newname" | sed 's/--/-/g' | sed 's/__/_/g' | sed 's/-././g')
              
              echo "✅ Found: $file"
              echo "➡️  Release Name: $newname"
              cp "$file" "artifacts/$newname"
            fi
          done
          
          echo "--- Summary ---"
          if [ "$(ls -A artifacts)" ]; then
            ls -lh artifacts/
          else
            echo "❌ ERROR: No installers found in bundle directories!"
            echo "Listing potential targets for debugging:"
            find . -name "target" -type d -maxdepth 4
            exit 1
          fi

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: artifacts/*
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
