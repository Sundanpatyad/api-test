name: Build and Release

on:
  push:
    branches:
      - main
      - build
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            target: 'aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            target: 'x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
            target: ''
          - platform: 'windows-latest'
            args: ''
            target: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install JS Dependencies
        run: |
          npm i
          # Ensure desktop dependencies are explicitly linked if npm i was flaky
          npm i -w apps/desktop

      - name: Build Tauri App
        run: |
          # Build JS frontend first
          cd apps/desktop && npm run build
          # Build Tauri binary and bundle
          npm run tauri:build -- --target ${{ matrix.target }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Rename and Prepare Artifacts
        shell: bash
        run: |
          echo "=== CI/CD MANUAL DISCOVERY ==="
          echo "Root CWD: $(pwd)"
          mkdir -p artifacts
          
          # We search specifically in the apps/desktop/src-tauri/target directory
          # The bundles are usually in target/[target]/release/bundle/
          SEARCH_PATH="apps/desktop/src-tauri/target"
          
          if [ ! -d "$SEARCH_PATH" ]; then
            echo "⚠️  Expected target path $SEARCH_PATH not found! Attempting root target search..."
            SEARCH_PATH="."
          fi
          
          echo "🔍 Searching for installers in $SEARCH_PATH..."
          # Find all installers, ignoring node_modules
          find "$SEARCH_PATH" -type f \( -name "*.dmg" -o -name "*.exe" -o -name "*.msi" -o -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" \) -not -path "*/node_modules/*" | while read -r file; do
            # Only process if it's in a 'bundle' folder
            if [[ "$file" == *"bundle"* ]]; then
              filename=$(basename "$file")
              echo "📝 Found: $file"
              
              # Rename logic (remove version pattern)
              newname=$(echo "$filename" | sed -E 's/(_|-)?[0-9]+\.[0-9]+\.[0-9]+(_|-)?[0-9]*//g')
              newname=$(echo "$newname" | sed 's/__/_/g' | sed 's/--/-/g')
              
              echo "✅ Renaming: $filename -> $newname"
              cp "$file" "artifacts/$newname"
            fi
          done
          
          echo "--- Discovery Results ---"
          if [ "$(ls -A artifacts)" ]; then
            ls -lh artifacts/
          else
            echo "❌ ERROR: No installers were found after manual build!"
            echo "Final check of the build output folder:"
            ls -R apps/desktop/src-tauri/target || echo "Target folder is missing!"
            exit 1
          fi

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: artifacts/*
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
