name: Build and Release

on:
  push:
    branches:
      - main
      - build
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            target: 'aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            target: 'x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
            target: ''
          - platform: 'windows-latest'
            args: ''
            target: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install JS Dependencies
        run: npm i

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        id: tauri_build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: './apps/desktop'
          includeRelease: false
          includeUpdaterJson: false
          args: ${{ matrix.args }}

      - name: Rename and Prepare Artifacts
        shell: bash
        run: |
          echo "=== CI/CD DIAGNOSTICS ==="
          echo "Current Path: $(pwd)"
          
          # List target directory structure if it exists to help debug
          if [ -d "apps/desktop/src-tauri/target" ]; then
            echo "Target Directory found. Listing structure (depth 3)..."
            find apps/desktop/src-tauri/target -maxdepth 4 -not -path '*/.*'
          else
            echo "⚠️  apps/desktop/src-tauri/target not found in root! Checking for other target folders..."
            find . -name "target" -type d -not -path "./node_modules/*"
          fi
          
          mkdir -p artifacts
          
          echo "--- Starting Deep Scan for Installers ---"
          # Find all potential installers, ignoring node_modules and .git
          # We don't filter by path yet, we want to see EVERYTHING
          find . -type f \( -name "*.dmg" -o -name "*.exe" -o -name "*.msi" -o -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" \) -not -path "./node_modules/*" -not -path "./.git/*" | while read -r file; do
            filename=$(basename "$file")
            echo "🔍 Located file: $file"
            
            # Use a more flexible name filter
            if [[ "$filename" =~ (PayloadX|API|Studio|SyncNest|syncnest|studio) ]]; then
              # Remove version pattern (e.g. _1.0.0_ or -1.0.0- or 1.0.0)
              newname=$(echo "$filename" | sed -E 's/(_|-)?[0-9]+\.[0-9]+\.[0-9]+(_|-)?[0-9]*//g')
              newname=$(echo "$newname" | sed 's/__/_/g' | sed 's/--/-/g')
              
              echo "✅ MATCHED: $filename -> $newname"
              cp "$file" "artifacts/$newname"
            else
              echo "⏭️ SKIPPED (Name mismatch): $filename"
            fi
          done
          
          echo "--- Scan Complete ---"
          if [ "$(ls -A artifacts)" ]; then
            echo "Artifacts prepared for upload:"
            ls -lh artifacts/
          else
            echo "❌ CRITICAL ERROR: No application bundles found anywhere in the workspace!"
            echo "Dumping full project tree (excluding node_modules)..."
            find . -maxdepth 5 -not -path '*/.*' -not -path "./node_modules/*"
            exit 1
          fi

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: artifacts/*
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
