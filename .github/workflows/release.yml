name: Build and Release

on:
  push:
    branches:
      - main
      - build
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            target: 'aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            target: 'x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
            target: ''
          - platform: 'windows-latest'
            args: ''
            target: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install JS Dependencies
        run: |
          npm i
          # Ensure desktop dependencies are explicitly linked if npm i was flaky
          npm i -w apps/desktop

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        id: tauri_build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: './apps/desktop'
          includeRelease: false
          includeUpdaterJson: false
          args: ${{ matrix.args }}

      - name: Rename and Prepare Artifacts
        shell: bash
        run: |
          echo "=== CI/CD UNIVERSAL DISCOVERY ==="
          echo "Workspace Root: $(pwd)"
          mkdir -p artifacts
          
          # Find all directories named 'bundle' anywhere in the project
          # This handles target/ at root or apps/desktop/src-tauri/target/
          BUNDLE_DIRS=$(find . -name "bundle" -type d -not -path "./node_modules/*")
          
          if [ -z "$BUNDLE_DIRS" ]; then
            echo "⚠️  No 'bundle' directories found yet. Searching for any installer files directly..."
            # Fallback to search root for any installer extensions
            TARGET_FILES=$(find . -type f \( -name "*.dmg" -o -name "*.exe" -o -name "*.msi" -o -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" \) -not -path "./node_modules/*")
          else
            echo "📂 Found bundle directories: $BUNDLE_DIRS"
            TARGET_FILES=$(find $BUNDLE_DIRS -type f \( -name "*.dmg" -o -name "*.exe" -o -name "*.msi" -o -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" \))
          fi
          
          echo "--- Processing Files ---"
          for file in $TARGET_FILES; do
            filename=$(basename "$file")
            echo "🔍 Processing: $file"
            
            # Remove version pattern (e.g. _1.0.0_ or -1.0.0- or 1.0.0)
            # We use a broad match for renaming to handle any installer found
            newname=$(echo "$filename" | sed -E 's/(_|-)?[0-9]+\.[0-9]+\.[0-9]+(_|-)?[0-9]*//g')
            newname=$(echo "$newname" | sed 's/__/_/g' | sed 's/--/-/g')
            
            echo "✅ Preparing: $filename -> $newname"
            cp "$file" "artifacts/$newname"
          done
          
          echo "--- Discovery Summary ---"
          if [ "$(ls -A artifacts)" ]; then
            echo "Artifacts successfully prepared:"
            ls -lh artifacts/
          else
            echo "❌ CRITICAL ERROR: No installers found after deep search!"
            echo "Listing root directory for context:"
            ls -F
            exit 1
          fi

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: artifacts/*
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
