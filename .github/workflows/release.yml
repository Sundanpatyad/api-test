name: Build and Release

on:
  push:
    branches:
      - main
      - build
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            target: 'aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            target: 'x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
            target: ''
          - platform: 'windows-latest'
            args: ''
            target: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install JS Dependencies
        run: npm i

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        id: tauri_build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: './apps/desktop'
          includeRelease: false
          includeUpdaterJson: false
          args: ${{ matrix.args }}

      - name: Rename and Prepare Artifacts
        shell: bash
        run: |
          echo "Current working directory: $(pwd)"
          echo "Scanning for bundles in workspace..."
          mkdir -p artifacts
          
          # We search from the project root for ANY installer files
          # We check specifically for installers to avoid internal binaries
          # Pattern: Find files with installer extensions that belong to a path containing 'bundle'
          # This should work regardless of where target-dir is.
          find . -type f \( -name "*.dmg" -o -name "*.exe" -o -name "*.msi" -o -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" \) | while read -r file; do
            # Only process if the path contains 'bundle' - this is a standard Tauri output location
            if [[ "$file" == *"bundle"* ]]; then
              filename=$(basename "$file")
              
              # Final safety check: must contain app keywords to avoid junk
              if [[ "$filename" =~ (PayloadX|API|Studio|SyncNest|syncnest) ]]; then
                # Remove version pattern (e.g. _1.0.0_ or -1.0.0- or 1.0.0)
                newname=$(echo "$filename" | sed -E 's/(_|-)?[0-9]+\.[0-9]+\.[0-9]+(_|-)?[0-9]*//g')
                
                # Clean up potential double underscores or hyphens
                newname=$(echo "$newname" | sed 's/__/_/g' | sed 's/--/-/g')
                
                echo "✅ Found Installer: $file"
                echo "➡️  Renaming for Release: $filename -> $newname"
                cp "$file" "artifacts/$newname"
              else
                echo "⏭️  Skipping non-app file: $filename"
              fi
            else
              echo "⏭️  Skipping non-bundle file: $file"
            fi
          done
          
          echo "Summary of artifacts prepared for upload:"
          if [ -d "artifacts" ] && [ "$(ls -A artifacts)" ]; then
            ls -lh artifacts/
          else
            echo "❌ CRITICAL: No installer artifacts found! The release build might have failed or target location changed."
            exit 1
          fi

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: artifacts/*
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
