name: Build and Release

on:
  push:
    branches:
      - main
      - build
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            target: 'aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            target: 'x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
            target: ''
          - platform: 'windows-latest'
            args: ''
            target: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install JS Dependencies
        run: npm i

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        id: tauri_build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: './apps/desktop'
          includeRelease: false
          includeUpdaterJson: false
          args: ${{ matrix.args }}

      - name: Rename and Prepare Artifacts
        shell: bash
        run: |
          # Define the target directory based on platform
          # Note: Tauri outputs are usually in apps/desktop/src-tauri/target/[target]/release/bundle/
          # or apps/desktop/src-tauri/target/release/bundle/
          
          echo "Scanning for bundles..."
          mkdir -p artifacts
          
          # Find all bundles (dmg, exe, msi, deb, rpm, AppImage)
          # We remove the version string (e.g. _1.0.0_) from the filenames
          find apps/desktop/src-tauri/target -type f \( -name "*.dmg" -o -name "*.exe" -o -name "*.msi" -o -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" \) | while read -r file; do
            filename=$(basename "$file")
            # Remove version pattern like _1.2.3_ or -1.2.3- or _1.2.3
            # This is a bit aggressive but matches Tauri's naming
            newname=$(echo "$filename" | sed -E 's/_[0-9]+\.[0-9]+\.[0-9]+(_[0-9]+)?//g' | sed -E 's/-[0-9]+\.[0-9]+\.[0-9]+(-[0-9]+)?//g')
            echo "Renaming $filename to $newname"
            cp "$file" "artifacts/$newname"
          done

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: artifacts/*
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
