name: Build and Release

on:
  push:
    branches:
      - main
      - build
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            target: 'aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            target: 'x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: '--target x86_64-unknown-linux-gnu'
            target: 'x86_64-unknown-linux-gnu'
          - platform: 'windows-latest'
            args: '--target x86_64-pc-windows-msvc'
            target: 'x86_64-pc-windows-msvc'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install JS Dependencies
        run: |
          npm i
          npm i -w apps/desktop

      - name: Build Tauri App
        run: |
          # Build Tauri binary and bundle
          # Tauri will automatically run the beforeBuildCommand (npm run build)
          npm run tauri:build -w syncnest-desktop -- ${{ matrix.args }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Rename and Prepare Artifacts
        shell: bash
        run: |
          echo "=== CI/CD ARTIFACT PREPARATION ==="
          mkdir -p artifacts
          
          echo "🔍 Searching for installers in apps/desktop/src-tauri/target..."
          # Find all installers, ignoring common noise
          find "apps/desktop/src-tauri/target" -type f \( -name "*.dmg" -o -name "*.exe" -o -name "*.msi" -o -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" \) -not -path "*/node_modules/*" | while read -r file; do
            # Only process if it's in a 'bundle' folder
            if [[ "$file" == *"bundle"* ]]; then
              filename=$(basename "$file")
              echo "📝 Found: $file"
              
              ext="${filename##*.}"
              base="${filename%.*}"
              
              # Clean up version numbers and replace spaces with dashes
              clean_name=$(echo "$base" | sed -E 's/(_|-)?[0-9]+\.[0-9]+\.[0-9]+(_|-)?[0-9]*//g')
              clean_name=$(echo "$clean_name" | tr ' ' '-')
              
              # Append target to distinguish architectures
              target_suffix="-${{ matrix.target }}"
              
              newname="${clean_name}${target_suffix}.${ext}"
              # Clean up any double dashes/underscores
              newname=$(echo "$newname" | sed 's/__/_/g' | sed 's/--/-/g')
              
              echo "✅ Copying to artifacts: $newname"
              cp "$file" "artifacts/$newname"
            fi
          done
          
          echo "--- Discovery Results ---"
          if [ "$(ls -A artifacts)" ]; then
            ls -lh artifacts/
          else
            echo "❌ ERROR: No installers were found!"
            echo "Searching all of apps/desktop/src-tauri/target for debug info:"
            find "apps/desktop/src-tauri/target" -maxdepth 4
            exit 1
          fi

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: artifacts/*
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
